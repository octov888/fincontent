<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>FinContent AI — Atualizar</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: #0d0d1a; color: #e0e0e0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.card { background: #1a1a2e; border: 1px solid #2a2a4e; border-radius: 16px; padding: 32px; width: 100%; max-width: 520px; }
.logo { font-size: 22px; font-weight: 800; color: #f5c842; margin-bottom: 4px; }
.sub { font-size: 12px; color: #666; margin-bottom: 28px; }
label { display: block; font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; margin-top: 16px; }
input[type=password], input[type=text] { width: 100%; background: #111; border: 1px solid #333; border-radius: 8px; padding: 10px 14px; color: #e0e0e0; font-size: 13px; outline: none; }
input:focus { border-color: #f5c842; }
.file-area { border: 2px dashed #333; border-radius: 10px; padding: 20px; text-align: center; cursor: pointer; margin-top: 6px; transition: all 0.2s; }
.file-area:hover, .file-area.selected { border-color: #f5c842; background: rgba(245,200,66,0.05); }
.file-area.selected { border-color: #2ecc71; }
input[type=file] { display: none; }
.btn { width: 100%; margin-top: 20px; padding: 14px; background: #f5c842; color: #000; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; }
.btn:hover { background: #e8b800; }
.btn:disabled { background: #333; color: #666; cursor: not-allowed; }
.btn.sec { background: #1e1e3a; color: #aaa; border: 1px solid #2a2a4e; margin-top: 8px; font-size: 12px; padding: 10px; }
.btn.sec:hover { background: #2a2a4e; color: #e0e0e0; }
.status { margin-top: 14px; padding: 12px 16px; border-radius: 8px; font-size: 13px; display: none; line-height: 1.7; }
.ok  { background: rgba(46,204,113,0.1); color: #2ecc71; border: 1px solid rgba(46,204,113,0.3); }
.err { background: rgba(231,76,60,0.1); color: #e74c3c; border: 1px solid rgba(231,76,60,0.3); }
.info { background: rgba(74,158,255,0.1); color: #4a9eff; border: 1px solid rgba(74,158,255,0.3); }
.step { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #888; margin-bottom: 6px; }
.step span { width: 18px; height: 18px; border-radius: 50%; background: #2a2a4e; color: #f5c842; font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.divider { border: none; border-top: 1px solid #2a2a4e; margin: 20px 0; }
.token-link { font-size: 11px; color: #4a9eff; margin-top: 4px; display: block; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">FinContent AI</div>
  <div class="sub">Atualizar app local + publicar site online</div>

  <!-- PASSO 1: ARQUIVO -->
  <div class="step"><span>1</span> Selecione o arquivo baixado desta conversa (qualquer nome)</div>
  <div class="file-area" id="fileArea" onclick="document.getElementById('fi').click()">
    <div style="font-size:28px;margin-bottom:6px;">📂</div>
    <div id="fileText" style="font-size:13px;color:#888;">Clique para selecionar o index.html</div>
    <input type="file" id="fi" accept=".html" onchange="selecionarArquivo(this)">
  </div>

  <hr class="divider">

  <!-- PASSO 2: AÇÕES -->
  <div class="step"><span>2</span> Escolha o que fazer</div>

  <button class="btn" onclick="atualizarLocal()" id="btnLocal">
    💾 Atualizar App Local
  </button>

  <button class="btn sec" onclick="publicarOnline()" id="btnOnline">
    🚀 Publicar no Site Online (fincontent.netlify.app)
  </button>

  <button class="btn sec" onclick="fazerTudo()" id="btnTudo">
    ⚡ Fazer os dois de uma vez
  </button>

  <!-- TOKEN (oculto inicialmente) -->
  <div id="tokenArea" style="display:none;margin-top:16px;">
    <label>🔑 GitHub Token (necessário para publicar online)</label>
    <input type="password" id="tokenInput" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
    <a class="token-link" href="https://github.com/settings/tokens/new?scopes=repo&description=fincontent-pub" target="_blank">
      → Criar token no GitHub (clique aqui)
    </a>
  </div>

  <div class="status" id="status"></div>
</div>

<script>
let arquivo = null;
let token = localStorage.getItem('fc_github_token') || '';

function selecionarArquivo(input) {
  arquivo = input.files[0];
  if (!arquivo) return;
  document.getElementById('fileArea').classList.add('selected');
  document.getElementById('fileText').innerHTML = 
    '<span style="color:#2ecc71;font-weight:600;">✓ ' + arquivo.name + '</span><br>' +
    '<span style="font-size:11px;color:#888;">' + (arquivo.size/1024).toFixed(0) + ' KB — pronto para usar</span>';
}

function mostrar(msg, tipo) {
  const s = document.getElementById('status');
  s.innerHTML = msg;
  s.className = 'status ' + tipo;
  s.style.display = 'block';
}

// ─── ATUALIZAR LOCAL ─────────────────────────────────────
function atualizarLocal() {
  if (!arquivo) { mostrar('⚠ Selecione o arquivo primeiro.', 'err'); return; }
  const a = document.createElement('a');
  const url = URL.createObjectURL(arquivo);
  a.href = url;
  a.download = 'FinContent AI.html';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  mostrar(
    '✅ <strong>Download iniciado!</strong><br>' +
    'O arquivo "FinContent AI.html" foi baixado.<br>' +
    'Mova-o para: <strong>C:\\Usuários\\User\\FinContent AI\\</strong><br>' +
    'e substitua o arquivo antigo.', 'ok'
  );
}

// ─── PUBLICAR ONLINE ─────────────────────────────────────
async function publicarOnline() {
  if (!arquivo) { mostrar('⚠ Selecione o arquivo primeiro.', 'err'); return; }

  // Verificar/pedir token
  if (!token) {
    document.getElementById('tokenArea').style.display = 'block';
    const input = document.getElementById('tokenInput');
    if (!input.value) {
      mostrar('⚠ Cole seu GitHub Token no campo acima e clique novamente.', 'info');
      return;
    }
    token = input.value.trim();
    localStorage.setItem('fc_github_token', token);
  }

  const btn = document.getElementById('btnOnline');
  btn.disabled = true; btn.textContent = '⏳ Publicando...';
  mostrar('📤 Enviando para GitHub...', 'info');

  try {
    const texto = await arquivo.text();
    const b64 = btoa(unescape(encodeURIComponent(texto)));

    // Obter SHA
    mostrar('🔍 Verificando versão atual...', 'info');
    let sha = null;
    try {
      const r = await fetch('https://api.github.com/repos/octov888/fincontent/contents/index.html', {
        headers: { 'Authorization': 'token ' + token, 'Accept': 'application/vnd.github.v3+json' }
      });
      if (r.ok) { const d = await r.json(); sha = d.sha; }
    } catch(e) {}

    mostrar('🚀 Enviando arquivo...', 'info');
    const body = { message: 'Atualizacao FinContent AI v2.1.0', content: b64 };
    if (sha) body.sha = sha;

    const resp = await fetch('https://api.github.com/repos/octov888/fincontent/contents/index.html', {
      method: 'PUT',
      headers: { 'Authorization': 'token ' + token, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' },
      body: JSON.stringify(body)
    });

    if (resp.ok) {
      mostrar(
        '✅ <strong>Site atualizado com sucesso!</strong><br>' +
        'Aguarde ~30 segundos e acesse:<br>' +
        '<a href="https://fincontent.netlify.app" target="_blank" style="color:#2ecc71;">👉 fincontent.netlify.app</a>',
        'ok'
      );
    } else {
      const err = await resp.json().catch(() => ({}));
      if (resp.status === 401) {
        token = ''; localStorage.removeItem('fc_github_token');
        document.getElementById('tokenArea').style.display = 'block';
        mostrar('❌ Token inválido ou expirado. Crie um novo token e tente novamente.', 'err');
      } else if (resp.status === 422) {
        mostrar('ℹ️ O arquivo já está atualizado no GitHub. Nenhuma mudança necessária.', 'info');
      } else {
        mostrar('❌ Erro ' + resp.status + ': ' + (err.message || 'Tente novamente.'), 'err');
      }
    }
  } catch(e) {
    mostrar('❌ Erro de conexão: ' + e.message, 'err');
  }

  btn.disabled = false; btn.textContent = '🚀 Publicar no Site Online (fincontent.netlify.app)';
}

// ─── FAZER OS DOIS ───────────────────────────────────────
async function fazerTudo() {
  if (!arquivo) { mostrar('⚠ Selecione o arquivo primeiro.', 'err'); return; }
  atualizarLocal();
  await new Promise(r => setTimeout(r, 1500));
  await publicarOnline();
}

// Se já tem token salvo, mostrar confirmação
if (token) {
  document.getElementById('tokenArea').style.display = 'block';
  document.getElementById('tokenInput').value = token;
  document.getElementById('tokenInput').placeholder = 'Token salvo ✓ (pode alterar se necessário)';
}
</script>
</body>
</html>
